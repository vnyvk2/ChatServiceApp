#docker-compose.yml
version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: chatservice-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - chatservice-network
    restart: unless-stopped

  chat-app:
    build: .
    container_name: chatservice-app
    depends_on:
      - mongodb
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/chatservice
      APP_SECURITY_ENABLED: "true"
      # For production, replace these with real secrets in your host environment!
      SECURITY_USER_NAME: admin
      SECURITY_USER_PASSWORD: admin
      APP_JWT_SECRET: hyIy1fm6pgbN4k5M64NhSTJlduzHQHchgLziz3AoNec=
      APP_ENCRYPTION_KEY: oYI7n/41gZhzT+jSSiulAzEwXDrVONpYuNc+t1OskG8=
    ports:
      - "8081:8081"
    networks:
      - chatservice-network
    restart: unless-stopped

volumes:
  mongodb_data:

networks:
  chatservice-network:
    driver: bridge
