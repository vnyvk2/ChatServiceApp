<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Sign Up - ChatService</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="auth-page">
    <div class="auth-container">
        <h2>Create Account</h2>
        <p>Join ChatService today</p>
        <form id="signupForm" class="auth-form">
            <div class="form-group">
                <input type="text" class="input-field" name="username" placeholder="Username" required />
            </div>
            <div class="form-group">
                <input type="email" class="input-field" name="email" placeholder="Email" required />
            </div>
            <div class="form-group">
                <input type="text" class="input-field" name="phoneNumber" placeholder="Phone Number (optional)" />
            </div>
            <div class="form-group">
                <input type="text" class="input-field" name="displayName" placeholder="Display Name" required />
            </div>
            <div class="form-group password-container">
                <input type="password" id="password" class="input-field" name="password" placeholder="Password (min 6 chars)"
                    required />
                <span class="password-toggle" onclick="togglePasswordVisibility()" title="Toggle Password Visibility">
                    <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-eye"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                </span>
            </div>
            <button type="submit" class="btn-primary">Create Account</button>
        </form>
        <div class="auth-footer">
            <p>Already have an account? <a href="/login.html">Sign in</a></p>
        </div>
    </div>

    <script>
        document.getElementById("signupForm").addEventListener("submit", async function (e) {
            e.preventDefault();
            const formData = new FormData(this);
            const data = Object.fromEntries(formData);
            let res = await fetch("/api/auth/register", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });
            const result = await res.json();
            if (res.ok && result.token) {
                localStorage.setItem('chatToken', result.token);
                localStorage.setItem('chatUser', JSON.stringify(result.user));
                window.location.href = "/chat.html";
            } else {
                alert(result.error || "Signup failed!");
            }
        });

        function togglePasswordVisibility() {
            const passwordInput = document.getElementById("password");
            const eyeIcon = document.getElementById("eye-icon");
            if (passwordInput.type === "password") {
                passwordInput.type = "text";
                eyeIcon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
            } else {
                passwordInput.type = "password";
                eyeIcon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
            }
        }
    </script>
</body>

</html>
