<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Chat - ChatService</title>
    <link href="assets/css/style.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>

<body>
    <div id="chat-section">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <button id="profile-btn" class="profile-btn"
                    style="display: flex; align-items: center; gap: 0.75rem; text-align: left; width: 100%;">
                    <div class="avatar"><i class="fas fa-user"></i></div>
                    <div class="user-info">
                        <span id="current-user" class="user-name">Loading...</span>
                        <div style="font-size: 0.75rem; color: var(--text-secondary);">My Profile</div>
                    </div>
                    <i class="fas fa-chevron-right" style="color: var(--text-secondary); font-size: 0.8rem;"></i>
                </button>
                <!-- Status Select moved to inside profile or kept here? I'll keep it here for quick access but maybe style it better or just keep it -->
                <!-- <select id="status-select"> ... </select> -->
            </div>
            <div style="padding: 0 1.25rem 1rem 1.25rem; border-bottom: 1px solid var(--border-light);">
                <select id="status-select" style="width: 100%; padding: 0.4rem; font-size: 0.85rem;">
                    <option value="ONLINE">🟢 Online</option>
                    <option value="AWAY">🟡 Away</option>
                    <option value="OFFLINE">⚫ Offline</option>
                </select>
            </div>

            <h3>Menu</h3>
            <div class="action-buttons">
                <button class="btn-ghost btn-ghost-primary" id="show-create-room-btn"><i class="fas fa-plus-circle"></i>
                    Create Room</button>
                <button class="btn-ghost" id="show-join-room-btn"><i class="fas fa-door-open"></i> Join Room</button>
                <button class="btn-ghost" id="show-dm-btn"><i class="fas fa-comment-alt"></i> Direct Message</button>
            </div>

            <h3>My Rooms</h3>
            <div id="room-list"></div>
        </div>

        <div class="main-content" style="display: flex; flex-direction: column; flex: 1; min-width: 0; overflow: hidden;">
            <div class="chat-header">
                <!-- Left side: clickable room info (acts like the profile button) -->
                <button id="chat-header-room-btn" class="profile-btn" style="display: flex; align-items: center; gap: 0.75rem; text-align: left; max-width: 60%; background: none; border: none; cursor: pointer; padding: 0.5rem 0.75rem; border-radius: 8px; transition: background 0.2s;" title="Room Info / Members">
                    <div class="avatar" id="chat-header-avatar" style="width: 40px; height: 40px; flex-shrink: 0;"><i class="fas fa-users"></i></div>
                    <div style="display: flex; flex-direction: column; justify-content: center; min-width: 0;">
                        <h2 id="current-room-name" style="margin: 0; line-height: 1.2; font-size: 1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Select a room</h2>
                        <div id="room-status-indicator" style="font-size: 0.75rem; color: var(--text-secondary); margin-top: 0.15rem;">Click to see details</div>
                    </div>
                </button>

                <!-- Right side: action buttons -->
                <div class="header-actions">
                    <!-- Rename button (Group chats only) -->
                    <button id="rename-room-btn" class="btn-ghost" title="Rename Group" style="display: none;">
                        <i class="fas fa-pen"></i> Rename
                    </button>
                    <!-- DM View Profile button -->
                    <button id="chat-header-info-btn" class="btn-ghost" title="View User Profile" style="display: none; color: var(--primary); background: #e0f2fe; border: 1px solid var(--primary);">
                        <i class="fas fa-info-circle"></i> View Profile
                    </button>
                </div>
            </div>

            <div style="display: flex; flex: 1; overflow: hidden;">
                <!-- Chat Area -->
                <div style="display: flex; flex-direction: column; flex: 1; min-width: 0;">
                    <div id="chat-messages">
                        <div class="welcome-message">
                            <i class="fas fa-comments"></i>
                            <h3>Welcome to ChatService</h3>
                            <p>Select a room or start a conversation</p>
                        </div>
                    </div>
                    <div id="typing-indicator" class="hidden"></div>
                    <div id="chat-input-area" class="hidden">
                        <input type="text" id="message-input" placeholder="Type a message...">
                        <button id="send-btn"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>

                <!-- Members Panel (hidden by default) -->
                <div id="members-panel" class="hidden"
                    style="border-left: 1px solid var(--border-light); width: 280px; flex-shrink: 0; background: linear-gradient(180deg, #ffffff 0%, #f0f9ff 100%); display: flex; flex-direction: column; overflow-y: auto;">
                    <h3 style="padding: 1.25rem 1.25rem 0.5rem 1.25rem; font-size: 0.9rem; margin: 0; border-bottom: 1px solid var(--border-light);">Room Members (<span id="room-members-count">0</span>)</h3>
                    <div id="online-users" style="padding: 1rem; display: flex; flex-direction: column; gap: 0.75rem;"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div id="modal-overlay" class="hidden"></div>

    <!-- Profile Modal -->
    <div id="profile-modal" class="modal hidden">
        <div class="profile-avatar-large"><i class="fas fa-user"></i></div>
        <h3 style="text-align: center;">My Profile</h3>

        <div class="modal-section">
            <label for="profile-username">Username</label>
            <input type="text" id="profile-username" placeholder="Username">
        </div>
        <div class="modal-section">
            <label for="profile-phone">Phone Number</label>
            <input type="text" id="profile-phone" placeholder="Phone Number">
        </div>
        <div class="modal-section">
            <label for="profile-email">Email (Optional)</label>
            <input type="email" id="profile-email" placeholder="Email">
        </div>

        <div class="modal-section" style="display: flex; align-items: center; justify-content: space-between; padding: 0.75rem 0; border-top: 1px solid var(--border-light); margin-top: 0.5rem;">
            <div>
                <label for="read-receipts-toggle" style="margin: 0; font-weight: 500;">Read Receipts</label>
                <div style="font-size: 0.75rem; color: var(--text-secondary); margin-top: 0.15rem;">Show blue ticks when you read messages</div>
            </div>
            <label class="toggle-switch">
                <input type="checkbox" id="read-receipts-toggle" checked>
                <span class="toggle-slider"></span>
            </label>
        </div>

        <div class="modal-actions">
            <button id="save-profile-btn" class="btn-confirm">Save Changes</button>
            <button class="cancel-modal-btn btn-cancel">Close</button>
        </div>

        <div class="logout-container">
            <button id="logout-btn" class="btn-danger-ghost"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
    </div>

    <!-- Rename Room Modal -->
    <div id="rename-room-modal" class="modal hidden">
        <h3>Rename Room</h3>
        <input type="text" id="rename-room-input" placeholder="New Room Name">
        <div class="modal-actions">
            <button id="confirm-rename-btn" class="btn-confirm">Rename</button>
            <button class="cancel-modal-btn btn-cancel">Cancel</button>
        </div>
    </div>

    <div id="create-room-modal" class="modal hidden">
        <input type="text" id="room-name" placeholder="Room Name">
        <textarea id="room-description"></textarea>
        <select id="room-type">
            <option value="GROUP_CHAT">Group Chat</option>
            <option value="BROADCAST">Broadcast</option>
        </select>
        <input type="checkbox" id="room-private"> Private?
        <button id="create-room-btn">Create</button>
        <button class="cancel-modal-btn">Cancel</button>
    </div>

    <!-- User Details Modal -->
    <div id="user-details-modal" class="modal hidden">
        <div class="profile-avatar-large"><i class="fas fa-user-circle"></i></div>
        <h3 id="ud-display-name" style="text-align: center;">User Name</h3>
        
        <div class="modal-section" style="margin-top: 1rem;">
            <label>Username</label>
            <div id="ud-username" style="padding: 0.75rem; background: #f8fafc; border-radius: var(--radius-md); border: 1px solid var(--border-light);"></div>
        </div>
        <div class="modal-section">
            <label>Phone Number</label>
            <div id="ud-phone" style="padding: 0.75rem; background: #f8fafc; border-radius: var(--radius-md); border: 1px solid var(--border-light);"></div>
        </div>
        
        <div class="modal-actions">
            <button id="modal-rename-btn" class="btn-confirm" style="background-color: var(--primary);">Rename Chat</button>
            <button class="cancel-modal-btn btn-cancel">Close</button>
        </div>
    </div>
    <div id="join-room-modal" class="modal hidden">
        <div id="available-rooms"></div>
    </div>
    <div id="direct-message-modal" class="modal hidden">
        <input type="text" id="dm-phone" placeholder="Phone Number">
        <input type="text" id="dm-username" placeholder="Username">
        <button id="start-dm-btn">Start</button>
        <button class="cancel-modal-btn">Cancel</button>
    </div>

    <!-- Toast -->
    <div id="toast-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script>
        // Redirect to login if no session
        if (!localStorage.getItem('chatToken')) {
            window.location.href = '/index.html';
        }
    </script>
    <script type="module" src="assets/js/app.js?v=11"></script>
</body>

</html>
